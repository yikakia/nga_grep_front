<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>大时代景气指数</title>
    <!-- CDN 资源 -->
    <!-- <script src="https://cdn.tailwindcss.com" data-cfasync="false"></script> -->
    <link href="./output.css" rel="stylesheet">
    <link href="./styles/custom.css" rel="stylesheet">
    <script data-cfasync="false">
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <script src="https://cdnjs.snrat.com/ajax/libs/Chart.js/3.7.1/chart.min.js"></script>
    <script src="https://cdnjs.snrat.com/ajax/libs/moment.js/2.29.1/moment.min.js"></script>
    <script src="https://cdnjs.snrat.com/ajax/libs/moment-timezone/0.5.34/moment-timezone.min.js"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-KK477STN21"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-KK477STN21');
    </script>

    <!-- 加载主应用脚本 -->
    <script type="module" src="dist/bundle.js"></script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100">
    <div class="container mx-auto p-4 dashboard-shell">
        <header class="panel-header">
            <div>
                <p class="panel-meta">NGA:706</p>
                <h1 class="panel-title">大时代景气指数</h1>
            </div>
            <button id="toggleDark" class="theme-toggle-btn" title="切换到深色模式" aria-label="切换主题">
                <span id="themeIcon" class="theme-toggle-icon" aria-hidden="true"></span>
            </button>
        </header>

        <main class="dashboard-main" aria-label="图表与筛选布局">
            <details class="panel-card panel-controls panel-controls-aside">
                <summary class="panel-section-title panel-controls-summary">筛选与查询</summary>
                <p class="panel-section-subtitle panel-controls-subtitle">按需展开设置后点击查询，图表将按当前条件刷新。</p>

                <div class="controls-grid">
                    <div class="control-group">
                        <label for="indicatorSelect" class="control-label">选择指标</label>
                        <select id="indicatorSelect" class="control-input">
                            <option value="">环比</option>
                            <option value="ma5">MA5</option>
                            <option value="ma10">MA10</option>
                            <option value="boll">BOLL</option>
                        </select>
                    </div>

                    <div class="control-group">
                        <label for="rangeSelect" class="control-label">快速选择</label>
                        <select id="rangeSelect" class="control-input">
                            <option value="2h">最近2小时</option>
                            <option value="8h">最近8小时</option>
                            <option value="24h">最近24小时</option>
                            <option value="3d">最近3天</option>
                            <option value="5d">最近5天</option>
                            <option value="7d">最近7天</option>
                            <option value="14d">最近14天</option>
                            <option value="30d">最近30天</option>
                            <option value="60d">最近60天</option>
                        </select>
                    </div>

                    <div class="control-group">
                        <label for="startDate" class="control-label">开始时间范围</label>
                        <input type="datetime-local" id="startDate" class="control-input">
                    </div>

                    <div class="control-group">
                        <label for="endDate" class="control-label">结束时间范围</label>
                        <input type="datetime-local" id="endDate" class="control-input">
                    </div>

                    <div class="control-group">
                        <label for="timeInterval" class="control-label">时间间隔</label>
                        <select id="timeInterval" class="control-input">
                            <option value="5m">5 分钟</option>
                            <option value="15m">15 分钟</option>
                            <option value="30m">30 分钟</option>
                            <option value="1h">1 小时</option>
                            <option value="4h">4 小时</option>
                            <option value="12h">12 小时</option>
                            <option value="24h">1 天</option>
                            <option value="168h">7 天</option>
                            <option value="336h">14 天</option>
                        </select>
                    </div>

                    <div class="control-group">
                        <label for="compareOffset" class="control-label">环比偏移</label>
                        <div class="control-inline">
                            <input type="number" id="compareOffset" value="0" min="0" class="control-input control-offset-input">
                            <select id="compareUnit" class="control-input control-unit-select">
                                <option value="hours">小时</option>
                                <option value="days">天</option>
                            </select>
                        </div>
                    </div>

                    <div class="control-actions">
                        <button id="fetchData" class="query-btn" type="button">查询</button>
                    </div>
                </div>
            </details>

            <section class="panel-card chart-card panel-content-main" aria-label="图表区">
                <h2 class="panel-section-title">发帖量趋势</h2>
                <p class="panel-section-subtitle">主图优先展示当前区间走势，支持按需叠加指标与环比线。</p>
                <div class="chart-frame">
                    <canvas id="timeSeriesChart" aria-label="发帖量统计" role="img" class="chart-canvas"></canvas>
                </div>
            </section>
        </main>

        <div id="toast" class="toast hidden fixed bottom-4 right-4" role="status" aria-live="polite"></div>
    </div>
</body>
</html>
